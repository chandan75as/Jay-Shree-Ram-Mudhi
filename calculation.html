<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Total Calculation - Jay Shree Ram Mudhi</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-maroon: #5E1914;
            --gold: #D4AF37;
            --white: #FDF7E3;
            --active-bg: rgba(212, 175, 55, 0.2);
            --danger: #ff4d4d;
            --success: #28a745;
            --edit: #4da6ff;
            --card-bg: rgba(0,0,0,0.3);
        }

        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg-maroon); color: var(--white); height: 100vh; display: flex; flex-direction: column; font-size: 18px; }
        
        /* Header */
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; border-bottom: 3px solid var(--gold); background: rgba(0,0,0,0.2); }
        .header-title { color: var(--gold); font-size: 2.2rem; font-weight: bold; text-transform: uppercase; margin: 0; text-align: center; }
        
        .back-btn { background: transparent; color: var(--gold); border: 2px solid var(--gold); padding: 8px 15px; border-radius: 6px; font-size: 1.2rem; cursor: pointer; font-weight: bold; text-decoration: none; transition: 0.2s; }
        .back-btn:hover { background: var(--gold); color: var(--bg-maroon); }

        /* Dashboard Area */
        .main-container { padding: 25px; flex: 1; overflow-y: auto; }
        
        .dashboard-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        
        .stat-card { background: var(--card-bg); border: 2px solid var(--gold); border-radius: 12px; padding: 20px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.3); position: relative; overflow: hidden; }
        .stat-title { font-size: 1.2rem; color: #ccc; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 2.5rem; font-weight: bold; color: var(--gold); }
        
        /* Specific Card Colors */
        .card-profit .stat-value { color: var(--success); }
        .card-loss .stat-value { color: var(--danger); }
        .card-due .stat-value { color: var(--danger); }
        .card-cash .stat-value { color: #4da6ff; }

        /* Lower Section Layout */
        .bottom-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
        
        .panel { background: var(--card-bg); border: 2px solid var(--gold); border-radius: 12px; padding: 20px; }
        .panel-title { font-size: 1.5rem; color: var(--gold); border-bottom: 2px dashed var(--gold); padding-bottom: 10px; margin-bottom: 15px; text-align: center; font-weight: bold; }

        /* Form Elements */
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid var(--gold); background: #333; color: white; box-sizing: border-box; font-size: 1.1rem; border-radius: 6px; }
        .btn-save { width: 100%; padding: 15px; background: var(--gold); border: none; cursor: pointer; font-weight: bold; color: var(--bg-maroon); margin-top: 10px; font-size: 1.3rem; border-radius: 6px; transition: 0.2s;}
        .btn-save:hover { filter: brightness(1.1); }

        /* Expense List */
        .expense-list { max-height: 400px; overflow-y: auto; padding-right: 5px; }
        .exp-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 6px; margin-bottom: 10px; border: 1px solid transparent; }
        .exp-item:hover { background: rgba(212,175,55,0.1); border-color: var(--gold); }
        .exp-details { display: flex; flex-direction: column; }
        .exp-type { font-size: 1.2rem; font-weight: bold; color: var(--white); }
        .exp-date { font-size: 0.9rem; color: #aaa; }
        .exp-desc { font-size: 1rem; color: #ccc; margin-top: 5px;}
        .exp-amount { font-size: 1.5rem; font-weight: bold; color: var(--danger); display: flex; align-items: center; gap: 15px;}
        
        .btn-del { background: none; border: none; color: var(--danger); font-size: 1.5rem; cursor: pointer; }

        #dbStatus { font-size: 1rem; color: #aaa; text-align: center; margin-top: -5px; padding-bottom: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="back-btn">⬅ Back</a>
        <h1 class="header-title">Total Business Calculation</h1>
        <div style="width: 80px;"></div> <!-- Spacer -->
    </header>

    <div id="dbStatus">Loading Cloud Data... ⏳</div>

    <div class="main-container">
        
        <!-- Dashboard Top Cards -->
        <div class="dashboard-grid">
            <div class="stat-card">
                <div class="stat-title">Total Sales (Bikri)</div>
                <div class="stat-value" id="totSales">₹0</div>
            </div>
            <div class="stat-card card-due">
                <div class="stat-title">Market Due (Fasa Paisa)</div>
                <div class="stat-value" id="totDue">₹0</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">Total Expenses (Kharcha)</div>
                <div class="stat-value" id="totExpense" style="color:var(--danger)">₹0</div>
            </div>
            <div class="stat-card" id="profitCard">
                <div class="stat-title" id="profitLabel">Net Profit</div>
                <div class="stat-value" id="netProfit">₹0</div>
            </div>
            <div class="stat-card card-cash" style="grid-column: span 4; background: rgba(0,0,0,0.5);">
                <div class="stat-title">Estimated Cash in Hand (Galle Mein Cash)</div>
                <div class="stat-value" id="cashInHand">₹0</div>
                <div style="font-size: 0.9rem; color: #aaa; margin-top:5px;">(Total Paid Collection - Total Expenses)</div>
            </div>
        </div>

        <!-- Expense Section -->
        <div class="bottom-grid">
            <!-- Add Expense Form -->
            <div class="panel">
                <div class="panel-title">Add New Expense (Kharcha)</div>
                
                <select id="expType">
                    <option value="" disabled selected>-- Kharcha Ka Type Chune --</option>
                    <option value="Raw Material (Dhaan/Mal)">Raw Material (Dhaan/Mal)</option>
                    <option value="Labour Pament">Labour Payment</option>
                    <option value="Electricity Bill">Electricity Bill</option>
                    <option value="Transport / Bhaada">Transport / Bhaada</option>
                    <option value="Machine Maintenance">Machine Maintenance</option>
                    <option value="Other">Other Kharcha</option>
                </select>
                
                <input type="number" id="expAmount" placeholder="Amount / Paisa (₹)">
                
                <textarea id="expDesc" rows="2" placeholder="Details (Kis ko diya, kyu diya...)"></textarea>
                
                <button class="btn-save" onclick="addExpense()">Save Kharcha</button>
            </div>

            <!-- Expense History List -->
            <div class="panel">
                <div class="panel-title">Expense History (Kharcha Report)</div>
                <div class="expense-list" id="expenseList">
                    <!-- Expenses will be rendered here -->
                </div>
            </div>
        </div>

    </div>

    <script>
        function autoCapitalize(text) {
            if (!text) return text;
            return text.replace(/\b\w/g, char => char.toUpperCase());
        }

        // ==========================================
        // FIREBASE SETUP
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyCVGhebdM8r-N82dYlOtXuvJghM3FK_iwc",
            authDomain: "jay-shree-ram-mudhi.firebaseapp.com",
            databaseURL: "https://jay-shree-ram-mudhi-default-rtdb.firebaseio.com",
            projectId: "jay-shree-ram-mudhi",
            storageBucket: "jay-shree-ram-mudhi.firebasestorage.app",
            messagingSenderId: "146218859864",
            appId: "1:146218859864:web:56a4dac1c0c20a3281b92d",
            measurementId: "G-Z86Z8VSQKT"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const dbRef = database.ref('appData/mainState');

        let state = { places: [], customers: [], defaultPrices: [], expenses: [] };
        
        // CLOUD SYNC
        dbRef.on('value', (snapshot) => {
            if (snapshot.exists()) {
                let cloudData = snapshot.val();
                state = {
                    places: cloudData.places || [],
                    customers: cloudData.customers || [],
                    defaultPrices: cloudData.defaultPrices || [],
                    expenses: cloudData.expenses || [] // Fetching expenses
                };
            } 
            document.getElementById('dbStatus').innerHTML = "Cloud Synced 🟢";
            document.getElementById('dbStatus').style.color = "#4CAF50";
            calculateAndRender(); 
        }, (error) => {
            document.getElementById('dbStatus').innerHTML = "Database Error 🔴";
            document.getElementById('dbStatus').style.color = "#ff4d4d";
        });

        function saveToCloud() { 
            dbRef.set(state).catch((error) => { alert("Data save nahi hua!"); });
        }

        // ==========================================
        // CALCULATIONS & RENDER
        // ==========================================
        function calculateAndRender() {
            let totalSales = 0;
            let totalCollected = 0;
            let totalMarketDue = 0;
            let totalAdvances = 0;

            // 1. Calculate from Customers (Sales & Dues)
            state.customers.forEach(c => {
                let custTotalBill = 0;
                let custTotalPaid = 0;
                
                if(c.history) {
                    c.history.forEach(h => {
                        custTotalBill += parseFloat(h.amt) || 0;
                        custTotalPaid += parseFloat(h.paid) || 0;
                    });
                }
                
                totalSales += custTotalBill;
                totalCollected += custTotalPaid;

                let netCustDue = custTotalBill - custTotalPaid;
                if(netCustDue > 0) {
                    totalMarketDue += netCustDue; // Log fasaya paisa
                } else if(netCustDue < 0) {
                    totalAdvances += Math.abs(netCustDue); // Jama advance
                }
            });

            // 2. Calculate Expenses
            let totalExpenses = 0;
            let expHTML = '';
            
            // Reversed expenses to show latest on top
            let reversedExpenses = [...(state.expenses || [])].reverse();
            
            reversedExpenses.forEach((exp, i) => {
                let actualIndex = state.expenses.length - 1 - i; // mapped for deletion
                totalExpenses += parseFloat(exp.amount) || 0;
                
                expHTML += `
                    <div class="exp-item">
                        <div class="exp-details">
                            <span class="exp-type">${exp.type}</span>
                            <span class="exp-date">📅 ${exp.date}</span>
                            <span class="exp-desc">${exp.desc || 'No details added'}</span>
                        </div>
                        <div class="exp-amount">
                            ₹${exp.amount}
                            <button class="btn-del" onclick="deleteExpense(${actualIndex})" title="Delete Kharcha">🗑️</button>
                        </div>
                    </div>
                `;
            });

            if(reversedExpenses.length === 0) {
                expHTML = '<div style="text-align:center; padding:30px; color:#aaa; font-size:1.2rem;">Koi kharcha record nahi hai.</div>';
            }

            // 3. Profit / Loss Calculation
            let netProfit = totalSales - totalExpenses;
            let profitCard = document.getElementById('profitCard');
            let profitLabel = document.getElementById('profitLabel');
            let profitValue = document.getElementById('netProfit');

            if(netProfit >= 0) {
                profitCard.className = "stat-card card-profit";
                profitLabel.innerText = "Net Profit (Fayda)";
                profitValue.innerText = `₹${netProfit}`;
            } else {
                profitCard.className = "stat-card card-loss";
                profitLabel.innerText = "Net Loss (Nuksaan)";
                profitValue.innerText = `₹${Math.abs(netProfit)}`;
            }

            // 4. Cash in Hand (Total Received - Total Spent)
            let cashInHand = totalCollected - totalExpenses;

            // Update DOM
            document.getElementById('totSales').innerText = `₹${totalSales}`;
            document.getElementById('totDue').innerText = `₹${totalMarketDue}`;
            document.getElementById('totExpense').innerText = `₹${totalExpenses}`;
            document.getElementById('cashInHand').innerText = `₹${cashInHand}`;
            document.getElementById('expenseList').innerHTML = expHTML;
        }

        // ==========================================
        // EXPENSE ACTIONS
        // ==========================================
        function addExpense() {
            let type = document.getElementById('expType').value;
            let amount = parseFloat(document.getElementById('expAmount').value);
            let desc = autoCapitalize(document.getElementById('expDesc').value.trim());

            if(!type || isNaN(amount) || amount <= 0) {
                alert("Kripya Kharcha ka Type aur Sahi Amount daalein!");
                return;
            }

            if(!state.expenses) state.expenses = [];
            
            let today = new Date().toLocaleDateString('en-GB');
            
            state.expenses.push({
                type: type,
                amount: amount,
                desc: desc,
                date: today
            });

            // Clear Form
            document.getElementById('expType').value = "";
            document.getElementById('expAmount').value = "";
            document.getElementById('expDesc').value = "";

            saveToCloud();
        }

        function deleteExpense(index) {
            if(confirm("Kya aap sach mein ye kharcha delete karna chahte hain? (Calculation change ho jayegi)")) {
                state.expenses.splice(index, 1);
                saveToCloud();
            }
        }

        // Enter key save for expenses
        window.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                let act = document.activeElement;
                if(act.id === 'expType' || act.id === 'expAmount' || act.id === 'expDesc') {
                    addExpense();
                }
            }
        });

    </script>
</body>
</html>
