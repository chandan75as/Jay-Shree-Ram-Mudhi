<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jay Shree Ram Mudhi Manager</title>
    <style>
        :root {
            --bg-maroon: #5E1914;
            --gold: #D4AF37;
            --white: #FDF7E3;
            --active-bg: rgba(212, 175, 55, 0.2);
        }

        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg-maroon); color: var(--white); height: 100vh; display: flex; flex-direction: column; }
        header { text-align: center; padding: 15px; border-bottom: 2px solid var(--gold); color: var(--gold); font-size: 2rem; font-weight: bold; text-transform: uppercase; }

        .main-wrapper { display: flex; flex: 1; overflow: hidden; padding: 20px; gap: 20px; }
        
        /* Sidebar */
        .sidebar { width: 80px; position: relative; }
        .plus-btn { width: 60px; height: 60px; background: var(--gold); color: var(--bg-maroon); border: none; border-radius: 50%; font-size: 30px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .dropdown { display: none; position: absolute; left: 70px; top: 0; background: #333; border: 1px solid var(--gold); width: 180px; border-radius: 8px; z-index: 100; }
        .dropdown a { display: block; padding: 12px; color: var(--white); text-decoration: none; border-bottom: 1px solid #444; cursor: pointer; }
        .dropdown a:hover { background: var(--gold); color: var(--bg-maroon); }

        /* Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr 1.5fr; gap: 20px; flex: 1; }
        .col { background: rgba(0,0,0,0.2); border: 1px solid var(--gold); border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; }
        .col-title { padding: 12px; background: rgba(212,175,55,0.1); text-align: center; color: var(--gold); font-weight: bold; border-bottom: 1px solid var(--gold); }
        .list { flex: 1; overflow-y: auto; padding: 10px; }
        .item { padding: 12px; margin-bottom: 5px; border: 1px solid transparent; cursor: pointer; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; }
        .item:hover { background: rgba(255,255,255,0.05); }
        .item.active { background: var(--active-bg); border-color: var(--gold); color: var(--gold); }
        
        /* Details & Buttons */
        .btn-small { background: var(--gold); color: var(--bg-maroon); border: none; border-radius: 4px; padding: 4px 10px; cursor: pointer; font-weight: bold; }
        .details-box { padding: 15px; font-size: 1.1rem; }
        .d-row { margin-bottom: 10px; display: flex; justify-content: space-between; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: var(--bg-maroon); border: 2px solid var(--gold); padding: 25px; border-radius: 10px; width: 320px; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid var(--gold); background: #333; color: white; box-sizing: border-box; }
        .btn-save { width: 100%; padding: 10px; background: var(--gold); border: none; cursor: pointer; font-weight: bold; color: var(--bg-maroon); }
    </style>
</head>
<body>

    <header>Jay Shree Ram Mudhi</header>

    <div class="main-wrapper">
        <div class="sidebar">
            <button class="plus-btn" onclick="toggleMenu(event)">+</button>
            <div id="dropdown" class="dropdown">
                <a onclick="openModal('place')">Add Place</a>
                <a onclick="openModal('customer')">Add Customer</a>
            </div>
        </div>

        <div class="grid">
            <div class="col"><div class="col-title">Places</div><div class="list" id="placeList"></div></div>
            <div class="col"><div class="col-title">Customers</div><div class="list" id="customerList"></div></div>
            <div class="col"><div class="col-title">Details</div><div class="list" id="detailsBox"></div></div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content" id="modalContent"></div>
    </div>

    <script>
        let state = JSON.parse(localStorage.getItem('mudhiData')) || { places: [], customers: [] };
        let activePlace = null;
        let activeCustomer = null;

        function save() { localStorage.setItem('mudhiData', JSON.stringify(state)); render(); }

        function toggleMenu(e) { 
            e.stopPropagation();
            document.getElementById('dropdown').style.display = (document.getElementById('dropdown').style.display === 'block') ? 'none' : 'block'; 
        }

        function openModal(type, targetCustIndex = null) {
            document.getElementById('dropdown').style.display = 'none';
            document.getElementById('modal').style.display = 'flex';
            let content = "";
            if(type === 'place') content = `<h3>Add Place</h3><input id="pName" placeholder="Place Name"><button class="btn-save" onclick="addPlace()">Save</button>`;
            else if(type === 'customer') {
                let options = state.places.map(p => `<option value="${p}">${p}</option>`).join('');
                content = `<h3>Add Customer</h3><input id="cName" placeholder="Customer Name"><select id="cPlace">${options}</select><button class="btn-save" onclick="addCustomer()">Save</button>`;
            } else {
                content = `<h3>Add Entry for ${state.customers[targetCustIndex].name}</h3><input id="prod" placeholder="Product"><input id="amt" type="number" placeholder="Total"><input id="paid" type="number" placeholder="Paid"><button class="btn-save" onclick="addTrans(${targetCustIndex})">Save</button>`;
            }
            document.getElementById('modalContent').innerHTML = content;
        }

        function addPlace() { state.places.push(document.getElementById('pName').value); closeAndSave(); }
        function addCustomer() { state.customers.push({name: document.getElementById('cName').value, place: document.getElementById('cPlace').value, history: []}); closeAndSave(); }
        function addTrans(idx) { 
            state.customers[idx].history.push({prod: document.getElementById('prod').value, amt: document.getElementById('amt').value, paid: document.getElementById('paid').value}); 
            closeAndSave(); 
        }

        function closeAndSave() { document.getElementById('modal').style.display = 'none'; save(); }

        // Core Render Logic
        function render() {
            // Render Places
            document.getElementById('placeList').innerHTML = state.places.map(p => 
                `<div class="item ${activePlace === p ? 'active' : ''}" onclick="selectPlace('${p}')">${p}</div>`
            ).join('');

            // Render Customers (Filtered)
            let filtered = activePlace ? state.customers.filter(c => c.place === activePlace) : [];
            document.getElementById('customerList').innerHTML = filtered.map((c, i) => {
                let realIdx = state.customers.indexOf(c);
                return `<div class="item ${activeCustomer === c.name ? 'active' : ''}" onclick="selectCustomer('${c.name}')">
                    ${c.name} <button class="btn-small" onclick="event.stopPropagation(); openModal('trans', ${realIdx})">+</button>
                </div>`;
            }).join('');

            // Render Details
            let custObj = state.customers.find(c => c.name === activeCustomer);
            if(custObj) {
                document.getElementById('detailsBox').innerHTML = custObj.history.map(h => `
                    <div class="details-box" style="border-bottom:1px solid #555">
                        <div class="d-row"><span>Product:</span> <b>${h.prod}</b></div>
                        <div class="d-row"><span>Total:</span> <span>₹${h.amt}</span></div>
                        <div class="d-row"><span>Paid:</span> <span style="color:green">₹${h.paid}</span></div>
                        <div class="d-row"><span>Baki:</span> <span style="color:red">₹${h.amt - h.paid}</span></div>
                    </div>
                `).join('');
            } else {
                document.getElementById('detailsBox').innerHTML = '<div style="text-align:center; padding:20px; opacity:0.5">Select a customer</div>';
            }
        }

        function selectPlace(p) { activePlace = p; activeCustomer = null; render(); }
        function selectCustomer(c) { activeCustomer = c; render(); }

        window.onclick = (e) => { 
            if(e.target.className === 'modal') e.target.style.display = 'none';
            document.getElementById('dropdown').style.display = 'none';
        }
        
        render();
    </script>
</body>
</html>
