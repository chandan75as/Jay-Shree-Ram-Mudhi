<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mudhi Mill Premium Manager</title>
    <style>
        :root {
            --premium-red: #8B0000;
            --gold: #D4AF37;
            --light-bg: #fffbf0;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--light-bg); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); border-top: 8px solid var(--premium-red); }
        
        h2 { text-align: center; color: var(--premium-red); text-transform: uppercase; letter-spacing: 2px; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .full-width { grid-column: span 2; }
        
        input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 6px; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: var(--gold); outline: none; box-shadow: 0 0 5px rgba(212, 175, 55, 0.5); }
        
        button { width: 100%; padding: 15px; background-color: var(--premium-red); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 16px; border-bottom: 4px solid #5a0000; }
        button:hover { background-color: #a50000; }

        table { width: 100%; border-collapse: collapse; margin-top: 30px; }
        th { background-color: var(--premium-red); color: white; padding: 12px; text-align: left; }
        td { border-bottom: 1px solid #ddd; padding: 12px; }
        tr:hover { background-color: #fff9e6; }
        
        .delete-btn { background-color: #d9534f; color: white; border: none; padding: 6px 12px; cursor: pointer; border-radius: 4px; }
        
        .summary-box { background: var(--gold); color: black; padding: 15px; text-align: right; font-size: 1.2em; font-weight: bold; border-radius: 6px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Mudhi Mill Management</h2>
    
    <div class="form-grid">
        <input type="text" id="name" placeholder="Customer Name">
        <input type="text" id="phone" placeholder="Phone Number">
        <input type="text" id="address" class="full-width" placeholder="Customer Address">
        <input type="number" id="qty" placeholder="Quantity (Kg)">
        <input type="number" id="rate" placeholder="Rate per Kg">
    </div>
    <button onclick="addEntry()">Add Entry to Records</button>

    <table>
        <thead>
            <tr>
                <th>Customer</th>
                <th>Phone</th>
                <th>Address</th>
                <th>Qty</th>
                <th>Rate</th>
                <th>Total</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="salesBody"></tbody>
    </table>
    
    <div class="summary-box" id="grandTotal">Grand Total: ₹0</div>
</div>

<script>
    function addEntry() {
        const name = document.getElementById('name').value;
        const phone = document.getElementById('phone').value;
        const address = document.getElementById('address').value;
        const qty = parseFloat(document.getElementById('qty').value);
        const rate = parseFloat(document.getElementById('rate').value);

        if (!name || !qty || !rate) { alert("Please fill Name, Quantity, and Rate"); return; }

        const total = qty * rate;
        const entry = { name, phone, address, qty, rate, total };

        let data = JSON.parse(localStorage.getItem('mudhiData')) || [];
        data.push(entry);
        localStorage.setItem('mudhiData', JSON.stringify(data));
        
        renderTable();
        // Clear fields
        document.querySelectorAll('input').forEach(input => input.value = '');
    }

    function renderTable() {
        const body = document.getElementById('salesBody');
        const data = JSON.parse(localStorage.getItem('mudhiData')) || [];
        body.innerHTML = '';
        let grandTotal = 0;

        data.forEach((item, index) => {
            grandTotal += item.total;
            body.innerHTML += `<tr>
                <td>${item.name}</td>
                <td>${item.phone}</td>
                <td>${item.address}</td>
                <td>${item.qty} kg</td>
                <td>₹${item.rate}</td>
                <td>₹${item.total}</td>
                <td><button class="delete-btn" onclick="deleteEntry(${index})">X</button></td>
            </tr>`;
        });
        document.getElementById('grandTotal').innerText = "Grand Total: ₹" + grandTotal;
    }

    function deleteEntry(index) {
        let data = JSON.parse(localStorage.getItem('mudhiData'));
        data.splice(index, 1);
        localStorage.setItem('mudhiData', JSON.stringify(data));
        renderTable();
    }

    window.onload = renderTable;
</script>

</body>
</html>
