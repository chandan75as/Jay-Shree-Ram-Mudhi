<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jay Shree Ram Mudhi Manager</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-maroon: #5E1914;
            --gold: #D4AF37;
            --white: #FDF7E3;
            --active-bg: rgba(212, 175, 55, 0.2);
            --danger: #ff4d4d;
            --success: #28a745;
            --edit: #4da6ff;
        }

        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg-maroon); color: var(--white); height: 100vh; display: flex; flex-direction: column; font-size: 18px; }
        
        /* Header */
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; border-bottom: 3px solid var(--gold); background: rgba(0,0,0,0.2); }
        .header-title { color: var(--gold); font-size: 2.5rem; font-weight: bold; text-transform: uppercase; margin: 0; }
        .header-left, .header-right { display: flex; gap: 15px; align-items: center; }
        
        .header-btn { background: var(--gold); color: var(--bg-maroon); border: none; width: 55px; height: 55px; border-radius: 50%; font-size: 28px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 8px rgba(0,0,0,0.3); display: flex; justify-content: center; align-items: center; }
        .edit-toggle-btn { background: transparent; border: 2px solid var(--gold); color: var(--gold); font-size: 24px; }
        .edit-toggle-btn.active { background: var(--danger); border-color: var(--danger); color: white; }

        /* Dropdowns */
        .dropdown-container { position: relative; }
        .dropdown { display: none; position: absolute; top: 65px; background: #333; border: 1px solid var(--gold); min-width: 220px; border-radius: 8px; z-index: 100; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .dropdown.left-drop { left: 0; }
        .dropdown.right-drop { right: 0; }
        .dropdown a { display: block; padding: 15px; color: var(--white); text-decoration: none; border-bottom: 1px solid #444; cursor: pointer; font-size: 1.1rem; }
        .dropdown a:hover { background: var(--gold); color: var(--bg-maroon); }

        /* Grid */
        .main-wrapper { display: flex; flex: 1; overflow: hidden; padding: 25px; gap: 25px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1.5fr; gap: 25px; width: 100%; }
        .col { background: rgba(0,0,0,0.2); border: 2px solid var(--gold); border-radius: 10px; display: flex; flex-direction: column; overflow: hidden; }
        .col-title { padding: 15px; background: rgba(212,175,55,0.1); text-align: center; color: var(--gold); font-weight: bold; font-size: 1.4rem; border-bottom: 2px solid var(--gold); }
        
        /* Lists */
        .search-bar { width: 92%; margin: 15px auto 5px; padding: 12px; border-radius: 6px; border: 2px solid var(--gold); background: #333; color: white; outline: none; box-sizing: border-box; text-transform: capitalize; font-size: 1.2rem; }
        .list { flex: 1; overflow-y: auto; padding: 15px; }
        .item { padding: 15px; margin-bottom: 8px; border: 1px solid transparent; cursor: pointer; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; font-size: 1.2rem; }
        .item:hover { background: rgba(255,255,255,0.05); }
        .item.active { background: var(--active-bg); border-color: var(--gold); color: var(--gold); font-weight: bold; }
        
        /* Actions */
        .item-actions { display: none; gap: 10px; }
        .edit-mode .item-actions { display: flex; }
        .btn-small { background: var(--gold); color: var(--bg-maroon); border: none; border-radius: 6px; padding: 5px 12px; cursor: pointer; font-weight: bold; font-size: 1.2rem; }
        .btn-icon { background: transparent; border: none; cursor: pointer; font-size: 20px; padding: 2px 5px; }
        .btn-icon.edit { color: var(--edit); }
        .btn-icon.del { color: var(--danger); }
        
        /* Details Area Header */
        .cust-header { display: flex; flex-direction: column; justify-content: center; color: var(--gold); margin-bottom: 20px; padding: 20px; border-bottom: 2px dashed var(--gold); position: relative; background: rgba(0,0,0,0.1); border-radius: 8px; min-height: 100px; }
        .price-corner-btn { position: absolute; right: 15px; top: 15px; font-size: 30px; background: none; border: none; cursor: pointer; transition: 0.2s; z-index: 2; }
        .price-corner-btn:hover { transform: scale(1.1); filter: drop-shadow(0 0 5px var(--gold)); }
        
        /* Corner Due Display Fixed Overlay */
        .due-corner { position: absolute; right: 15px; bottom: 15px; font-size: 1.4rem; font-weight: bold; background: rgba(0,0,0,0.7); padding: 5px 10px; border-radius: 6px; z-index: 2;}
        .place-tag { font-size: 0.9rem; color: #ccc; margin-left: 8px; font-weight: normal; }

        /* Date Rows */
        .date-row {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.3); padding: 15px 20px; margin-bottom: 10px;
            border-radius: 8px; border: 1px solid var(--gold); cursor: pointer;
            font-size: 1.3rem; transition: 0.2s;
        }
        .date-row:hover { background: rgba(212,175,55,0.15); }
        .d-row { margin-bottom: 12px; display: flex; justify-content: space-between; font-size:1.2rem; word-break: break-word; align-items: center;}
        
        .prod-list-box { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 6px; font-size: 1.1rem; line-height: 1.6; border: 1px solid #555; width: 100%; box-sizing: border-box; }

        /* Modals */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: var(--bg-maroon); border: 3px solid var(--gold); padding: 30px; border-radius: 12px; width: 450px; position: relative; max-height: 90vh; overflow-y: auto;}
        
        .close-btn { position: absolute; top: 10px; right: 20px; font-size: 35px; color: var(--gold); cursor: pointer; font-weight: bold; transition: 0.2s; z-index:10; }
        .close-btn:hover { color: var(--danger); transform: scale(1.1); }
        
        .modal-content h3 { font-size: 1.8rem; text-align: center; color: var(--gold); margin-top: 0; margin-bottom: 15px; }
        
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid var(--gold); background: #333; color: white; box-sizing: border-box; font-size: 1.2rem; border-radius: 6px; font-family: inherit; }
        textarea { resize: vertical; }
        input[readonly] { background: rgba(0,0,0,0.3); color: var(--gold); border: none; font-weight: bold; font-size: 1.4rem; text-align: right; }
        
        #pName, #cName, #cNearby { text-transform: capitalize; }
        .btn-save { width: 100%; padding: 15px; background: var(--gold); border: none; cursor: pointer; font-weight: bold; color: var(--bg-maroon); margin-top: 15px; font-size: 1.4rem; border-radius: 6px; }
        
        #dbStatus { font-size: 1rem; color: #aaa; text-align: center; margin-top: -5px; padding-bottom: 5px; font-weight: bold; }

        /* Cart styling */
        .cart-item { display: flex; justify-content: space-between; border-bottom: 1px solid #555; padding: 8px 0; font-size:1.1rem; }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <div class="dropdown-container">
                <button class="header-btn" onclick="toggleMenu('addDrop', event)">+</button>
                <div id="addDrop" class="dropdown left-drop">
                    <a onclick="openModal('place')">Add Place (Ctrl+A+P)</a>
                    <a onclick="openModal('customer')">Add Customer (Ctrl+A+C)</a>
                </div>
            </div>
            <button class="header-btn edit-toggle-btn" id="editToggleBtn" onclick="toggleEditMode()" title="Toggle Edit/Delete Mode">✏️</button>
        </div>

        <div>
            <h1 class="header-title">Jay Shree Ram Mudhi</h1>
            <div id="dbStatus">Loading Cloud Data... ⏳</div>
        </div>

        <div class="header-right">
            <div class="dropdown-container">
                <button class="header-btn" onclick="toggleMenu('mainDrop', event)">☰</button>
                <div id="mainDrop" class="dropdown right-drop">
                    <a href="price.html">Our Price List</a>
                    <a onclick="alert('Staff Management - Coming Soon!')">Staff Management</a>
                    <a href="calculation.html">Total Calculation</a>
                    <a onclick="alert('Billing System - Coming Soon!')">Billing</a>
                </div>
            </div>
        </div>
    </header>

    <div class="main-wrapper">
        <div class="grid">
            <div class="col">
                <div class="col-title">Places</div>
                <input type="text" id="searchPlace" class="search-bar" placeholder="🔍 Search Place..." onkeyup="render()">
                <div class="list" id="placeList"></div>
            </div>
            
            <div class="col">
                <div class="col-title">Customers</div>
                <input type="text" id="searchCust" class="search-bar" placeholder="🔍 Global Customer Search..." onkeyup="render()">
                <div class="list" id="customerList"></div>
            </div>
            
            <div class="col">
                <div class="col-title">Details</div>
                <div class="list" id="detailsBox"></div>
            </div>
        </div>
    </div>

    <!-- Modal Background -->
    <div id="modal" class="modal">
        <div class="modal-content" id="modalContent"></div>
    </div>

    <script>
        function autoCapitalize(text) {
            if (!text) return text;
            return text.replace(/\b\w/g, char => char.toUpperCase());
        }

        // ==========================================
        // FIREBASE SETUP
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyCVGhebdM8r-N82dYlOtXuvJghM3FK_iwc",
            authDomain: "jay-shree-ram-mudhi.firebaseapp.com",
            databaseURL: "https://jay-shree-ram-mudhi-default-rtdb.firebaseio.com",
            projectId: "jay-shree-ram-mudhi",
            storageBucket: "jay-shree-ram-mudhi.firebasestorage.app",
            messagingSenderId: "146218859864",
            appId: "1:146218859864:web:56a4dac1c0c20a3281b92d",
            measurementId: "G-Z86Z8VSQKT"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const dbRef = database.ref('appData/mainState');

        let state = { places: [], customers: [], defaultPrices: [] };
        let activePlace = null;
        let activeCustomerIdx = null; 
        let isEditMode = false;
        
        let tempBillItems = [];
        let tempBillTotal = 0;
        let editingPriceIdx = -1;
        
        // CLOUD SYNC
        dbRef.on('value', (snapshot) => {
            if (snapshot.exists()) {
                let cloudData = snapshot.val();
                state.places = cloudData.places || [];
                state.customers = cloudData.customers || [];
                state.defaultPrices = cloudData.defaultPrices || []; 
            } else { 
                state = { places: [], customers: [], defaultPrices: [] }; 
            }
            document.getElementById('dbStatus').innerHTML = "Cloud Synced 🟢";
            document.getElementById('dbStatus').style.color = "#4CAF50";
            render(); 
        }, (error) => {
            document.getElementById('dbStatus').innerHTML = "Database Error 🔴";
            document.getElementById('dbStatus').style.color = "#ff4d4d";
        });

        function saveToCloud() { 
            dbRef.set({ 
                places: state.places, 
                customers: state.customers,
                defaultPrices: state.defaultPrices || []
            }).catch((error) => { alert("Data save nahi hua!"); });
        }

        // ==========================================
        // UI & MODALS 
        // ==========================================
        function toggleEditMode() {
            isEditMode = !isEditMode;
            document.body.classList.toggle('edit-mode', isEditMode);
            document.getElementById('editToggleBtn').classList.toggle('active', isEditMode);
        }

        function toggleMenu(menuId, e) { 
            e.stopPropagation();
            document.getElementById('addDrop').style.display = 'none';
            document.getElementById('mainDrop').style.display = 'none';
            document.getElementById(menuId).style.display = 'block'; 
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        function openModal(type, targetIdx = null, transIdx = null) {
            document.getElementById('addDrop').style.display = 'none';
            document.getElementById('mainDrop').style.display = 'none';
            document.getElementById('modal').style.display = 'flex';
            
            let closeBtnHTML = `<span class="close-btn" onclick="closeModal()" title="Close">&times;</span>`;
            let content = "";
            
            if(type === 'place') {
                content = `${closeBtnHTML}<h3>Add Place</h3><input id="pName" placeholder="Place Name"><button class="btn-save" onclick="addPlace()">Save Data</button>`;
            } 
            else if(type === 'editPlace') {
                content = `${closeBtnHTML}<h3>Edit Place</h3><input id="pName" value="${targetIdx}" placeholder="Place Name"><button class="btn-save" onclick="saveEditedPlace('${targetIdx}')">Update Place</button>`;
            }
            else if(type === 'customer') {
                let options = state.places.slice().reverse().map(p => `<option value="${p}" ${p === activePlace ? 'selected' : ''}>${p}</option>`).join('');
                content = `${closeBtnHTML}<h3>Add Customer</h3>
                <input id="cName" placeholder="Customer Name">
                <input id="cPhone" type="text" placeholder="Mobile No. (10 Digits)" maxlength="10" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                <select id="cPlace">${options}</select>
                <input id="cNearby" type="text" placeholder="Nearby Landmark (Optional)">
                <button class="btn-save" onclick="addCustomer()">Save Data</button>`;
            } 
            else if(type === 'editCustomer') {
                let c = state.customers[targetIdx];
                // Places map without reverse so selection works smoothly, or with reverse it's fine.
                let options = state.places.slice().reverse().map(p => `<option value="${p}" ${p === c.place ? 'selected' : ''}>${p}</option>`).join('');
                content = `${closeBtnHTML}<h3>Edit Customer</h3>
                <input id="cName" value="${c.name}">
                <input id="cPhone" type="text" value="${c.phone}" placeholder="Mobile No. (10 Digits)" maxlength="10" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                <select id="cPlace">${options}</select>
                <input id="cNearby" type="text" value="${c.nearby || ''}" placeholder="Nearby Landmark (Optional)">
                <button class="btn-save" onclick="saveEditedCustomer(${targetIdx})">Update Details</button>`;
            }
            else if(type === 'priceList') {
                editingPriceIdx = -1;
                let c = state.customers[targetIdx];
                let pList = c.priceList || [];
                let listHTML = pList.map((p, i) => `
                    <div style="display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.1); padding:10px 15px; margin-bottom:8px; border-radius:6px; border:1px solid var(--gold);">
                        <span style="font-size:1.2rem; font-weight:bold;">${p.prodName}</span>
                        <div style="display:flex; align-items:center; gap: 10px;">
                            <span style="font-size:1.2rem; color:var(--gold);">₹${p.rate}</span>
                            <button onclick="editPriceForm(${targetIdx}, ${i})" style="color:var(--edit); background:none; border:none; cursor:pointer; font-size:1.2rem;" title="Edit Price">✏️</button>
                            <button onclick="deletePrice(${targetIdx}, ${i})" style="color:var(--danger); background:none; border:none; cursor:pointer; font-size:1.2rem;" title="Delete Price">🗑️</button>
                        </div>
                    </div>
                `).join('');
                
                content = `${closeBtnHTML}
                    <h3 style="margin-bottom:5px;">📜 ${c.name} ki Price List</h3>
                    <p style="text-align:center; font-size:0.9rem; color:#aaa; margin-top:0;">Agar yahan khali raha toh bill mein Global Price List aayega.</p>
                    <div style="max-height: 200px; overflow-y:auto; margin-bottom: 20px;">
                        ${listHTML || '<div style="text-align:center; padding:15px; color:#aaa;">Personal price add nahi hai.</div>'}
                    </div>
                    <div style="background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px; border: 1px dashed var(--gold);">
                        <h4 style="margin:0 0 10px 0; color:var(--gold); text-align:center;">Naya Product Rate Set Karein</h4>
                        <input id="newPName" placeholder="Product Name (e.g., Special Mudhi)">
                        <input id="newPRate" type="number" placeholder="Rate / Price (₹)">
                        <button id="priceSaveBtn" class="btn-save" style="margin-top:5px; font-size:1.2rem; padding:10px;" onclick="addPrice(${targetIdx})">Save Rate</button>
                    </div>`;
            }
            else if(type === 'trans') {
                tempBillItems = []; 
                tempBillTotal = 0;
                let c = state.customers[targetIdx];
                
                let pList = (c.priceList && c.priceList.length > 0) ? c.priceList : (state.defaultPrices || []);
                
                if(pList.length === 0) {
                    content = `${closeBtnHTML}<h3>New Bill</h3>
                               <p style="text-align:center; color:var(--danger); font-size:1.3rem; font-weight:bold; margin-top:30px;">Menu se pehle 'Our Price List' set karein ya Customer ki list banayein!</p>`;
                } else {
                    let listType = (c.priceList && c.priceList.length > 0) ? "Customer Price List" : "Global Price List";
                    let options = pList.map((p, i) => `<option value="${i}">${p.prodName} (₹${p.rate})</option>`).join('');
                    
                    content = `${closeBtnHTML}<h3>New Bill <br><span style="font-size:0.9rem; color:#aaa; font-weight:normal;">(Using: ${listType})</span></h3>
                               <div id="billCart" style="max-height:160px; overflow-y:auto; margin-bottom:15px; background:rgba(0,0,0,0.4); padding:10px; border-radius:6px; border:1px solid #555;">
                                   <div style="text-align:center; color:#aaa; font-style:italic;">Cart abhi khali hai</div>
                               </div>
                               <div style="display:flex; gap:10px; margin-bottom:20px; align-items:center;">
                                   <select id="billProd" style="margin:0; flex:2;">
                                       <option value="" disabled selected>-- Product Chune --</option>
                                       ${options}
                                   </select>
                                   <input id="billQty" type="number" placeholder="Qty" style="margin:0; flex:1;">
                                   <button id="addBtn" onclick="addBillItem(${targetIdx})" style="background:#17a2b8; color:white; border:none; border-radius:6px; padding:12px; cursor:pointer; font-weight:bold; font-size:1.1rem;">+ Add</button>
                               </div>
                               <hr style="border-color:var(--gold); margin-bottom:15px;">
                               <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                                   <span style="font-size:1.2rem; color:var(--gold);">Total Bill Amount:</span>
                                   <input id="amt" value="₹0" readonly style="width:140px; margin:0;">
                               </div>
                               <div style="display:flex; justify-content:space-between; align-items:center;">
                                   <span style="font-size:1.2rem;">Paid Amount:</span>
                                   <input id="paid" type="number" placeholder="0" style="width:140px; margin:0; font-weight:bold; font-size:1.4rem;">
                               </div>
                               <button class="btn-save" onclick="addTrans(${targetIdx})">Save Final Bill</button>`;
                }
            }
            else if(type === 'dateBills') {
                let dateStr = transIdx; 
                let c = state.customers[targetIdx];
                let hIdx = c.history.findIndex(h => h.date === dateStr);
                let h = c.history[hIdx];
                
                let prevDue = 0;
                for(let k = 0; k < hIdx; k++) {
                    prevDue += (parseFloat(c.history[k].amt) || 0) - (parseFloat(c.history[k].paid) || 0);
                }
                
                let closingBal = prevDue + parseFloat(h.amt) - parseFloat(h.paid);
                
                let prevDueText = prevDue > 0 ? `<span style="color:var(--danger)">₹${prevDue} (Due)</span>` : (prevDue < 0 ? `<span style="color:var(--success)">+₹${Math.abs(prevDue)} (Advance)</span>` : `<span style="color:#aaa;">₹0</span>`);
                let closeBalText = closingBal > 0 ? `<span style="color:var(--danger)">₹${closingBal} (Due)</span>` : (closingBal < 0 ? `<span style="color:var(--success)">+₹${Math.abs(closingBal)} (Advance)</span>` : `<span style="color:#aaa;">₹0 (Clear)</span>`);

                let formattedProd = h.prod ? h.prod.replace(/\n/g, '<br>') : '';

                content = `${closeBtnHTML}
                    <h3 style="margin-bottom:15px; font-size: 2rem;">📅 ${h.date}</h3>
                    <div style="background:rgba(0,0,0,0.3); border-radius:12px; padding:20px; border:1px solid var(--gold); position:relative;">
                        
                        <div style="display:flex; justify-content:flex-end; gap:10px; margin-bottom: 15px; border-bottom:1px solid #555; padding-bottom:10px;">
                            <button class="btn-icon edit" onclick="openModal('editTrans', ${targetIdx}, ${hIdx})" title="Edit Aaj ka Record">✏️ Edit Day</button>
                            <button class="btn-icon del" onclick="deleteTrans(${targetIdx}, ${hIdx})" title="Delete Aaj ka Record">🗑️ Delete Day</button>
                        </div>
                        
                        <div class="d-row" style="flex-direction:column;">
                            <span style="margin-bottom:5px; color:var(--gold);">🛒 Items Bought:</span>
                            <div class="prod-list-box">
                                ${formattedProd || '<span style="color:#aaa;">Cash Payment</span>'}
                            </div>
                        </div>
                        
                        <hr style="border-color:#555; margin:15px 0;">
                        
                        <div class="d-row"><span>🕒 Pichla Baki (Prev Due):</span> <b>${prevDueText}</b></div>
                        <div class="d-row"><span>📝 Aaj Ka Bill:</span> <b>₹${h.amt}</b></div>
                        <div class="d-row"><span>💰 Aaj Jama Kiya (Paid):</span> <b style="color:var(--success)">₹${h.paid}</b></div>
                        
                        <hr style="border-color:var(--gold); margin:15px 0;">
                        
                        <div class="d-row" style="font-size:1.5rem; align-items:center;">
                            <span>📊 Final Hisaab:</span> 
                            <b>${closeBalText}</b>
                        </div>
                    </div>`;
            }
            else if(type === 'editTrans') {
                let t = state.customers[targetIdx].history[transIdx];
                content = `${closeBtnHTML}<h3>Edit Daily Record</h3>
                           <p style="color:#aaa; font-size:0.9rem; text-align:center; margin-top:-10px;">(Dhyan rahe, yeh aaj ka poora hisaab edit karega)</p>
                           <textarea id="prod" rows="5" placeholder="Product Details (Ek ke neeche ek likhein)">${t.prod}</textarea>
                           <input id="amt" type="number" value="${t.amt}" placeholder="Total Bill Amount (₹)">
                           <input id="paid" type="number" value="${t.paid}" placeholder="Amount Paid (₹)">
                           <button class="btn-save" onclick="saveEditedTrans(${targetIdx}, ${transIdx})">Update Record</button>`;
            }
            
            document.getElementById('modalContent').innerHTML = content;
            setTimeout(() => { let input = document.querySelector('.modal-content input:not([readonly])'); if(input) input.focus(); }, 100);
        }

        // =======================
        // CART LOGIC
        // =======================
        function addBillItem(cIdx) {
            let sel = document.getElementById('billProd');
            let qtyInput = document.getElementById('billQty');
            if(sel.value === "" || isNaN(qtyInput.value) || qtyInput.value <= 0) return;
            
            let c = state.customers[cIdx];
            let pList = (c.priceList && c.priceList.length > 0) ? c.priceList : (state.defaultPrices || []);
            let prod = pList[sel.value];
            
            tempBillItems.push({ name: prod.prodName, qty: parseFloat(qtyInput.value), total: prod.rate * parseFloat(qtyInput.value) });
            
            sel.value = ""; qtyInput.value = "";
            renderBillCart(); qtyInput.focus(); 
        }
        function removeBillItem(index) { tempBillItems.splice(index, 1); renderBillCart(); }
        function renderBillCart() {
            let cartDiv = document.getElementById('billCart');
            tempBillTotal = 0;
            if(tempBillItems.length === 0) {
                cartDiv.innerHTML = '<div style="text-align:center; color:#aaa; font-style:italic;">Cart abhi khali hai</div>';
                document.getElementById('amt').value = "₹0"; return;
            }
            cartDiv.innerHTML = tempBillItems.map((item, index) => {
                tempBillTotal += item.total;
                return `<div class="cart-item">
                    <span>${item.name} <small style="color:var(--gold);">(x${item.qty})</small></span>
                    <span>₹${item.total} <button onclick="removeBillItem(${index})" style="background:none; border:none; color:var(--danger); cursor:pointer;">❌</button></span>
                </div>`;
            }).join('');
            document.getElementById('amt').value = "₹" + tempBillTotal;
            cartDiv.scrollTop = cartDiv.scrollHeight;
        }

        // =======================
        // DATA ACTIONS
        // =======================
        function editPriceForm(cIdx, pIdx) {
            let p = state.customers[cIdx].priceList[pIdx];
            document.getElementById('newPName').value = p.prodName;
            document.getElementById('newPRate').value = p.rate;
            editingPriceIdx = pIdx;
            document.getElementById('priceSaveBtn').innerText = "Update Rate";
        }

        function addPrice(cIdx) {
            let n = autoCapitalize(document.getElementById('newPName').value.trim());
            let r = parseFloat(document.getElementById('newPRate').value);
            if(!n || isNaN(r)) return;
            
            if(!state.customers[cIdx].priceList) state.customers[cIdx].priceList = [];
            
            if(editingPriceIdx > -1) {
                state.customers[cIdx].priceList[editingPriceIdx] = { prodName: n, rate: r };
            } else {
                state.customers[cIdx].priceList.push({ prodName: n, rate: r });
            }
            editingPriceIdx = -1;
            saveToCloud(); openModal('priceList', cIdx); 
        }
        function deletePrice(cIdx, pIdx) { state.customers[cIdx].priceList.splice(pIdx, 1); saveToCloud(); openModal('priceList', cIdx); }
        
        function addPlace() { 
            let p = autoCapitalize(document.getElementById('pName').value.trim()); 
            if(!p || state.places.find(x => x.toLowerCase() === p.toLowerCase())) return;
            state.places.push(p); saveToCloud(); closeModal();
        }
        function saveEditedPlace(oldName) {
            let newName = autoCapitalize(document.getElementById('pName').value.trim()); 
            if(!newName || newName === oldName) { closeModal(); return; }
            let idx = state.places.indexOf(oldName);
            if(idx > -1) state.places[idx] = newName;
            state.customers.forEach(c => { if(c.place === oldName) c.place = newName; });
            if(activePlace === oldName) activePlace = newName;
            saveToCloud(); closeModal();
        }
        function deletePlace(p) {
            if(confirm(`Kya aap sach mein ${p} ko delete karna chahte hain?`)) {
                state.places = state.places.filter(x => x !== p);
                if(activePlace === p) { activePlace = null; activeCustomerIdx = null; }
                saveToCloud();
            }
        }

        function addCustomer() { 
            let name = autoCapitalize(document.getElementById('cName').value.trim());
            let phone = document.getElementById('cPhone').value;
            let place = document.getElementById('cPlace').value;
            let nearby = autoCapitalize(document.getElementById('cNearby').value.trim()); // New Nearby Add
            if(!name || !place || phone.length !== 10) return;
            state.customers.push({name, phone, place, nearby, history: [], priceList: []}); 
            saveToCloud(); closeModal();
        }
        function saveEditedCustomer(idx) {
            let phone = document.getElementById('cPhone').value;
            if(phone.length !== 10) return;
            state.customers[idx].name = autoCapitalize(document.getElementById('cName').value.trim());
            state.customers[idx].phone = phone; 
            state.customers[idx].place = document.getElementById('cPlace').value;
            state.customers[idx].nearby = autoCapitalize(document.getElementById('cNearby').value.trim()); // New Nearby Update
            saveToCloud(); closeModal();
        }
        function deleteCustomer(idx) {
            if(confirm(`Kya aap sach mein customer ${state.customers[idx].name} ko delete karna chahte hain?`)) {
                state.customers.splice(idx, 1); activeCustomerIdx = null; saveToCloud();
            }
        }

        // ONE ROW PER DATE SMART MERGING LOGIC
        function addTrans(idx) { 
            let paid = parseFloat(document.getElementById('paid').value) || 0;
            let amt = tempBillTotal;
            
            let prodString = tempBillItems.map(i => `${i.name} (x${i.qty}) = ₹${i.total}`).join('\n');

            if(tempBillItems.length === 0) {
                if(paid > 0) {
                    prodString = "Cash Payment";
                } else {
                    alert("Bhai, kam se kam product chuno ya Paisa (Paid Amount) daalo!"); return; 
                }
            }
            
            let today = new Date().toLocaleDateString('en-GB');
            if(!state.customers[idx].history) state.customers[idx].history = [];
            let existingIdx = state.customers[idx].history.findIndex(h => h.date === today);
            
            if(existingIdx > -1) {
                let t = state.customers[idx].history[existingIdx];
                if(prodString !== "Cash Payment") {
                    if (!t.prod || t.prod === "Cash Payment") {
                        t.prod = prodString; 
                    } else {
                        t.prod = t.prod + "\n" + prodString; 
                    }
                } else if(!t.prod) {
                    t.prod = "Cash Payment";
                }
                t.amt = (parseFloat(t.amt) || 0) + amt;
                t.paid = (parseFloat(t.paid) || 0) + paid;
            } else {
                state.customers[idx].history.push({prod: prodString, amt: amt, paid: paid, date: today}); 
            }
            
            saveToCloud(); closeModal();
        }
        
        function saveEditedTrans(cIdx, tIdx) {
            state.customers[cIdx].history[tIdx].prod = document.getElementById('prod').value.trim();
            state.customers[cIdx].history[tIdx].amt = parseFloat(document.getElementById('amt').value) || 0;
            state.customers[cIdx].history[tIdx].paid = parseFloat(document.getElementById('paid').value) || 0;
            saveToCloud(); closeModal();
        }
        
        function deleteTrans(cIdx, tIdx) {
            if(confirm("Dhyan rahe: Kya aap is din ka poora record delete karna chahte hain?")) { 
                state.customers[cIdx].history.splice(tIdx, 1); 
                saveToCloud(); closeModal(); 
            }
        }

        // =======================
        // RENDER UI (REVERSED LISTS)
        // =======================
        function render() {
            let searchP = document.getElementById('searchPlace').value.toLowerCase();
            let searchC = document.getElementById('searchCust').value.toLowerCase();

            // Reverse Places list so newly added comes on top
            let filteredPlaces = state.places.filter(p => p.toLowerCase().includes(searchP));
            document.getElementById('placeList').innerHTML = filteredPlaces.slice().reverse().map(p => `
                <div class="item ${activePlace === p ? 'active' : ''}" onclick="selectPlace('${p}')">
                    <div>📍 ${p}</div>
                    <div class="item-actions">
                        <button class="btn-icon edit" onclick="event.stopPropagation(); openModal('editPlace', '${p}')">✏️</button>
                        <button class="btn-icon del" onclick="event.stopPropagation(); deletePlace('${p}')">🗑️</button>
                    </div>
                </div>
            `).join('');

            // Reverse Customer list so newly added comes on top
            let filteredCust = (searchC.trim() !== '') ? state.customers.filter(c => c.name.toLowerCase().includes(searchC) || (c.phone && c.phone.includes(searchC))) : (activePlace ? state.customers.filter(c => c.place === activePlace) : []);
            
            document.getElementById('customerList').innerHTML = filteredCust.slice().reverse().map(c => {
                let realIdx = state.customers.indexOf(c); // Keeps original index connection safe
                let nearbyTag = c.nearby ? ` <span style="font-size: 0.8rem; color:#888;">(Near: ${c.nearby})</span>` : '';
                return `
                <div class="item ${activeCustomerIdx === realIdx ? 'active' : ''}" onclick="selectCustomer(${realIdx})">
                    <div>👤 ${c.name} ${(searchC.trim() !== '') ? `<span class="place-tag">📍 ${c.place}</span>` : ''}</div>
                    <div style="display:flex; gap:8px;">
                        <div class="item-actions">
                            <button class="btn-icon edit" onclick="event.stopPropagation(); openModal('editCustomer', ${realIdx})">✏️</button>
                            <button class="btn-icon del" onclick="event.stopPropagation(); deleteCustomer(${realIdx})">🗑️</button>
                        </div>
                        <button class="btn-small" onclick="event.stopPropagation(); openModal('trans', ${realIdx})">New Bill</button>
                    </div>
                </div>`;
            }).join('');

            if(activeCustomerIdx !== null && state.customers[activeCustomerIdx]) {
                let c = state.customers[activeCustomerIdx];
                let historyArr = c.history || [];
                
                let grandTotalBill = 0, grandTotalPaid = 0;
                
                historyArr.forEach((h) => {
                    grandTotalBill += parseFloat(h.amt) || 0;
                    grandTotalPaid += parseFloat(h.paid) || 0;
                });
                
                let net = grandTotalPaid - grandTotalBill;
                let dueStatusHTML = '';
                if(net < 0) {
                    dueStatusHTML = `<div class="due-corner" style="color:var(--danger); border-color:var(--danger);">Due: ₹${Math.abs(net)}</div>`;
                } else if(net > 0) {
                    dueStatusHTML = `<div class="due-corner" style="color:var(--success); border-color:var(--success);">Advance: +₹${net}</div>`;
                }

                let todayStr = new Date().toLocaleDateString('en-GB');
                
                let mappedHistory = historyArr.map((h, i) => ({...h, originalIndex: i}));
                let reversedHistory = mappedHistory.reverse();
                
                let datesListHTML = reversedHistory.map(h => {
                    let label = (h.date === todayStr) ? `Today (${h.date})` : h.date;
                    return `
                    <div class="date-row" onclick="openModal('dateBills', ${activeCustomerIdx}, '${h.date}')" title="Hisaab Dekhein">
                        <span>📅 ${label}</span>
                        <span style="color:var(--gold); font-weight:bold;">₹${h.amt}</span>
                    </div>`;
                }).join('');
                
                if(historyArr.length === 0) {
                    datesListHTML = '<div style="text-align:center; padding:30px; opacity:0.5; font-size:1.4rem;">Abhi tak koi transaction nahi hai.</div>';
                }

                // Append nearby text nicely in details header
                let nearbyText = c.nearby ? ` (Near: ${c.nearby})` : '';

                document.getElementById('detailsBox').innerHTML = `
                    <div class="cust-header">
                        <button class="price-corner-btn" onclick="openModal('priceList', ${activeCustomerIdx})" title="Price List Setup">📜</button>
                        <div style="font-size: 2.2rem; font-weight:bold; margin-bottom: 5px; max-width:85%;">👤 ${c.name}</div>
                        <div style="font-size: 1.1rem; color: #ccc; margin-bottom: 30px;">📞 ${c.phone || 'N/A'} &nbsp;|&nbsp; 📍 ${c.place}${nearbyText}</div>
                        ${dueStatusHTML}
                    </div>
                    <div style="padding: 10px 0;">
                        ${datesListHTML}
                    </div>`;
            } else {
                document.getElementById('detailsBox').innerHTML = '<div style="text-align:center; padding:40px; opacity:0.5; font-size:1.5rem;">Kisi customer ko select karein</div>';
            }
        }

        function selectPlace(p) { activePlace = p; activeCustomerIdx = null; render(); }
        function selectCustomer(idx) { activeCustomerIdx = idx; activePlace = state.customers[idx].place; render(); }

        // ==========================================
        // EVENTS
        // ==========================================
        window.addEventListener('keydown', function(e) {
            if (document.getElementById('modal').style.display === 'flex') {
                let act = document.activeElement;
                if (e.key === 'Enter') { 
                    if(act && act.tagName === 'TEXTAREA') { return; }
                    e.preventDefault(); 
                    if(act && act.id === 'billQty') { document.getElementById('addBtn').click(); } 
                    else if(act && act.tagName !== 'BUTTON') {
                        let saveBtns = document.querySelector('.modal-content').querySelectorAll('.btn-save');
                        if(saveBtns.length > 0) saveBtns[saveBtns.length-1].click(); 
                    }
                }
                else if (e.key === 'Escape') { closeModal(); }
            }
        });

        let keysPressed = {};
        window.addEventListener('keydown', function(e) {
            keysPressed[e.key.toLowerCase()] = true;
            if (e.ctrlKey && keysPressed['a'] && keysPressed['p']) { e.preventDefault(); openModal('place'); keysPressed = {}; }
            else if (e.ctrlKey && keysPressed['a'] && keysPressed['c']) { e.preventDefault(); openModal('customer'); keysPressed = {}; }
        });
        window.addEventListener('keyup', function(e) { keysPressed[e.key.toLowerCase()] = false; });

        window.onclick = (e) => { 
            if(!e.target.matches('.header-btn')) {
                document.getElementById('addDrop').style.display = 'none';
                document.getElementById('mainDrop').style.display = 'none';
            }
        }
    </script>
</body>
</html>
