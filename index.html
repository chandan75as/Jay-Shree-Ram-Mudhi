<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jay Shree Ram Mudhi Mill</title>
    <style>
        /* Define Color Palette - Strictly No White */
        :root {
            --bg-golden: linear-gradient(135deg, #f8d568 0%, #d4af37 100%); /* Premium Golden Gradient */
            --bhagwa-saffron: #FF9933; /* Rich Bhagwa */
            --premium-red: #C11B17; /* Deep Premium Red */
            --text-golden: #D4AF37; /* Metallic Gold Text */
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 0; 
            height: 100vh; 
            background: var(--bg-golden); 
            overflow: hidden; /* Prevent scrolling for the initial view */
        }

        /* Header Section */
        .header-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }

        .header-text {
            color: var(--bhagwa-saffron);
            font-size: 2.5rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            font-family: 'Arial Black', Gadget, sans-serif; /* Bold Font */
        }

        /* Action Button (Red 3D +) */
        .action-container {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .add-button {
            background-color: var(--premium-red);
            color: var(--text-golden); /* Golden + symbol */
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            font-size: 3rem;
            font-weight: bold;
            line-height: 60px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.5), inset 0 -3px 0 rgba(0, 0, 0, 0.3); /* 3D Effect */
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .add-button:active {
            transform: translateY(3px);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.5), inset 0 -1px 0 rgba(0, 0, 0, 0.3);
        }

        /* Dropdown Menu */
        .dropdown-menu {
            display: none; /* Hidden by default */
            position: absolute;
            top: 70px; /* Just below the button */
            right: 0;
            background-color: var(--premium-red);
            border: 2px solid var(--text-golden);
            border-radius: 8px;
            width: 160px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
            z-index: 100;
            padding: 5px 0;
        }

        .dropdown-menu.show {
            display: block;
        }

        .dropdown-menu ul {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .dropdown-menu ul li {
            color: var(--text-golden); /* Golden text */
            padding: 12px 15px;
            cursor: pointer;
            transition: background-color 0.2s;
            font-weight: bold;
        }

        .dropdown-menu ul li:hover {
            background-color: var(--bhagwa-saffron);
            color: var(--premium-red); /* Red text on hover */
        }

        /* Main Content Area (Initially Empty) */
        .main-content {
            margin-top: 100px; /* Spacing from header */
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 100px);
            color: var(--text-golden);
            font-size: 1.5rem;
            font-weight: bold;
            text-transform: uppercase;
        }

    </style>
</head>
<body>

    <!-- Header -->
    <header class="header-container">
        <h1 class="header-text">Jay Shree Ram Mudhi</h1>
    </header>

    <!-- Action Button and Dropdown -->
    <div class="action-container">
        <button class="add-button" onclick="toggleDropdown()">+</button>
        <div id="actionDropdown" class="dropdown-menu">
            <ul>
                <li onclick="selectOption('Place')">Place</li>
                <li onclick="selectOption('Costumer')">Costumer</li>
                <!-- You can add more options here later -->
            </ul>
        </div>
    </div>

    <!-- Main Content (Empty) -->
    <main class="main-content">
        Records khali hain...
    </main>

    <script>
        function toggleDropdown() {
            const dropdown = document.getElementById('actionDropdown');
            dropdown.classList.toggle('show');
        }

        // Close the dropdown if the user clicks outside of it
        window.onclick = function(event) {
            if (!event.target.matches('.add-button')) {
                const dropdown = document.getElementById('actionDropdown');
                if (dropdown.classList.contains('show')) {
                    dropdown.classList.remove('show');
                }
            }
        }

        function selectOption(option) {
            alert("Aapne chuna: " + option);
            // Yahan par aap naya page open kar sakte hain ya form dikha sakte hain.
            toggleDropdown(); // Close dropdown after selection
        }
    </script>

</body>
</html>
